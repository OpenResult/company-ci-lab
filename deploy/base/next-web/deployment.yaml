apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: next-web
  template:
    metadata:
      labels:
        app: next-web
    spec:
      containers:
        - name: next-web
          image: localhost:5000/next-web:dev
          ports:
            - containerPort: 3000
