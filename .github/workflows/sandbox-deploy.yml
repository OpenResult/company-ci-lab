name: sandbox-deploy

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Deployment target
        required: true
        default: openshift
        type: choice
        options:
          - kubernetes
          - openshift

jobs:
  sandbox-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@stable
      - name: Run sandbox deployment
        run: cargo run -p company-ci -- deploy ${{ inputs.platform }}
