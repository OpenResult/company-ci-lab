name: release-company-ci

on:
  push:
    tags:
      - 'company-ci-v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build -p company-ci --release
      - name: Package release asset
        run: |
          mkdir -p dist
          cp target/release/company-ci dist/company-ci
