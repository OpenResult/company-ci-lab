name: emulated-e2e

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  emulated-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run emulated end-to-end flow
        run: cargo run -p company-ci -- e2e emulated
